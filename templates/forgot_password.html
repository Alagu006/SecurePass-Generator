<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Password Security Toolkit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            color: #00b4db;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #a0c8ff;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0c8ff;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00b4db;
        }
        button {
            background: linear-gradient(45deg, #00b4db, #0083b0);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: linear-gradient(45deg, #0083b0, #00b4db);
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .alert-danger {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid red;
            color: #ff9999;
        }
        .alert-info {
            background: rgba(0, 180, 219, 0.1);
            border: 1px solid #00b4db;
            color: #a0c8ff;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #00b4db;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><i class="fas fa-key"></i> Forgot Password</h1>
            <p class="subtitle">Enter your email to reset your password</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" required placeholder="Enter your registered email">
                </div>
                
                <button type="submit">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            
            <div class="links">
                <p>Remember your password? <a href="{{ url_for('auth.login') }}">Login here</a></p>
                <p><a href="{{ url_for('home') }}"><i class="fas fa-home"></i> Back to Home</a></p>
            </div>
        </div>
    </div>
</body>
</html>
